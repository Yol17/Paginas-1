<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios CIOS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo de la Empresa" class="logo">
        <h1>Servicios CIOS</h1>
    </header>

    <main>
        <section class="services">
            <h2>Nuestros Servicios</h2>
            <div class="grid">
                <div class="service-item">Servicio 1</div>
                <div class="service-item">Servicio 2</div>
                <div class="service-item">Servicio 3</div>
                <!-- Añadir más servicios según sea necesario -->
            </div>
        </section>

        <section class="contact-form">
            <h2>Contáctanos</h2>
            <form action="submit_form.php" method="POST">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone">

                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="social-media">
            <a href="https://facebook.com/empresa" target="_blank">Facebook</a>
            <a href="https://twitter.com/empresa" target="_blank">Twitter</a>
            <a href="https://linkedin.com/company/empresa" target="_blank">LinkedIn</a>
        </div>
        <div class="contact-info">
            <p>Email: contacto@empresa.com</p>
            <p>Teléfono: +123 456 7890</p>
        </div>
    </footer>   
    <script src="script.js"></script>
</body>

</html>
