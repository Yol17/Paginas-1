<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="diseño/style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="calculator_display">0</div>
            <div class="calculator_keypad">
                <div class="keypad_numbers">
                    <div class="keypad_button number">7</div>
                    <div class="keypad_button number">8</div>  
                    <div class="keypad_button number">9</div>
                    <div class="keypad_button dark">/</div>
                    <div class="keypad_button number">4</div>
                    <div class="keypad_button number">5</div>
                    <div class="keypad_button number">6</div>
                    <div class="keypad_button dark">*</div>
                    <div class="keypad_button number">1</div>
                    <div class="keypad_button number">2</div>
                    <div class="keypad_button number">3</div>
                    <div class="keypad_button dark">+</div>
                    <div class="keypad_button number">=</div>
                    <div class="keypad_button number">0</div>
                    <div class="keypad_button number">C</div>
                    <div class="keypad_button dark">-</div>
                    <div class="keypad_button dark"></div>
                    <div class="keypad_button dark">.</div>
                    <div class="keypad_button dark">%</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script/calculadora.js"></script>
    
</body>
</html>
