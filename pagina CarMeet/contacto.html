<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="normalize.css">
</head>
<body>
  
  
    <header>
        <h1>Compras</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a href="contacto.html">Entradas</a></li>
            <li><a href="donde_estamos.html">Dónde estamos</a></li>
        </ul>
    </nav>

    
      <main>
        <section class="ticket-form">
          
            <h2>Entradas</h2>
            <form id="ticketForm">
              <form id="ticketForm">
                <div class="form-group">
                    <label for="ticketType">Tipo de Entrada:</label>
                    <select id="ticketType" name="ticketType">
                        <option value="general">General ($20)</option>
                        <option value="vip">VIP ($50)</option>
                        <option value="premium">Premium ($80)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ticketQuantity">Cantidad de Entradas:</label>
                    <input type="number" id="ticketQuantity" name="ticketQuantity" min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="totalAmount">Total a Pagar:</label>
                    <span id="totalAmountLabel"></span>
                </div>
                <div class="form-group">
                  
                </div>
            </form>
          </form>
        </section>
         <!-- Formulario de Información de Tarjeta -->
         <div class="form-column">
          <h2>Información de Tarjeta</h2>
          <form id="cardInfoForm">
              <!-- Campos de Información de Tarjeta -->
              <div class="form-group">
                  <label for="cardNumber">Número de Tarjeta:</label>
                  <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456">
              </div>
              <div class="form-group">
                  <label for="expirationDate">Caducidad:</label>
                  <input type="text" id="expirationDate" name="expirationDate" placeholder="MM/YY">
              </div>
              <div class="form-group">
                  <label for="cvv">Código de Seguridad (CVV2):</label>
                  <input type="text" id="cvv" name="cvv" placeholder="123">
              </div>
              <div class="form-group">
                  <label for="cardHolder">Titular de la Tarjeta:</label>
                  <input type="text" id="cardHolder" name="cardHolder" placeholder="Nombre del Titular">
              </div>
              <!-- Dirección de Facturación -->
              <h2>Dirección de Facturación</h2>
              <div class="form-group">
                  <label for="address">Dirección:</label>
                  <input type="text" id="address" name="address" placeholder="Calle y Número">
              </div>
              <div class="form-group">
                  <label for="city">Ciudad:</label>
                  <input type="text" id="city" name="city" placeholder="Ciudad">
              </div>
              <div class="form-group">
                  <label for="state">Provincia:</label>
                  <input type="text" id="state" name="state" placeholder="Provincia">
              </div>
              <div class="form-group">
                  <label for="postalCode">Código Postal:</label>
                  <input type="text" id="postalCode" name="postalCode" placeholder="Código Postal">
              </div>
              <!-- Correo Electrónico -->
              <h2>Correo Electrónico</h2>
              <div class="form-group">
                  <label for="email">Correo Electrónico:</label>
                  <input type="email" id="email" name="email" placeholder="correo@example.com">
              </div>
              <!-- Botón de Ingresar -->
              <div class="form-group">
                  <button type="button" id="enterButton">Ingresar</button>
              </div>
          </form>
      </div>
  </section>
</main>
</body>
</html>
