<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Personal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">MiLogo</div>
        <nav>
            <ul>
                <li><a href="#home">Inicio</a></li>
                <li><a href="#about">Sobre Mí</a></li>
                <li><a href="#portfolio">Portafolio</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#contact">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="section">
        <div class="intro">
            <h1>Bienvenido a Mi Página</h1>
            <p>Explora mis trabajos y proyectos</p>
            <a href="#portfolio" class="btn">Ver Mi Trabajo</a>
        </div>
    </section>

    <section id="about" class="section">
        <h2>Sobre Mí</h2>
        <div class="content">
            <img src="mi-foto.jpg" alt="Foto de mí">
            <div class="bio">
                <p>Breve biografía sobre mí.</p>
                <div class="timeline">
                    <!-- Línea de tiempo con hitos -->
                </div>
            </div>
        </div>
    </section>

    <section id="portfolio" class="section">
        <h2>Portafolio</h2>
        <div class="gallery">
            
        </div>
    </section>

    <section id="blog" class="section">
        <h2>Blog</h2>
        <div class="posts">
            <!-- Artículos -->
        </div>
    </section>

    <section id="contact" class="section">
        <h2>Contacto</h2>
        <form action="#" method="post">
            <input type="text" name="name" placeholder="Nombre" required>
            <input type="email" name="email" placeholder="Correo Electrónico" required>
            <textarea name="message" placeholder="Mensaje" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <div class="socials">
            <!-- Iconos de redes sociales -->
        </div>
        <p>&copy; 2024 Mi Nombre. Todos los derechos reservados.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
